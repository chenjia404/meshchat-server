name: meshchat-server
services:
  postgres:
    image: postgres:18-alpine
    container_name: meshchat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: meshchat
      POSTGRES_USER: meshchat
      POSTGRES_PASSWORD: meshchat
    volumes:
      - ./postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meshchat -d meshchat"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:latest
    container_name: meshchat-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ./redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  ipfs:
    image: ipfs/kubo:latest
    container_name: meshchat-ipfs
    restart: unless-stopped
    ports:
      - "8381:8080"
    volumes:
      - ./ipfs-data:/data/ipfs
      - ./ipfs-container-init.d:/container-init.d:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:5001/api/v0/version >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  app:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: meshchat-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ipfs:
        condition: service_healthy
    environment:
      APP_NAME: meshchat-server
      LOG_LEVEL: info
      HTTP_ADDR: :8080
      ADMIN_HTTP_ADDR: :8081
      SHUTDOWN_TIMEOUT: 10s
      SERVER_MODE: public
      SERVER_ADMIN_PEER_IDS: ""
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin123456
      DATABASE_URL: postgres://meshchat:meshchat@postgres:5432/meshchat?sslmode=disable
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ""
      REDIS_DB: 0
      JWT_SECRET: meshchat-local-secret
      JWT_ISSUER: meshchat-server
      JWT_EXPIRATION: 72h
      AUTH_CHALLENGE_TTL: 5m
      IPFS_API_URL: http://ipfs:5001
      IPFS_GATEWAY_BASE_URL: http://localhost:8081
      AUTO_MIGRATE: "true"
      WS_WRITE_WAIT: 10s
      WS_PONG_WAIT: 60s
      WS_PING_INTERVAL: 54s
      WS_SEND_BUFFER: 128
      ONLINE_TTL: 90s
    ports:
      - "8581:8080"
      - "8582:8081"
